services:
  redis:
    image: redis:7-alpine
    container_name: edulearn-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: edulearn-app
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env.docker
    environment:
      SPRING_APPLICATION_NAME: edulearn
      REDIS_HOST: redis
      REDIS_PORT: 6379
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${APP_PORT:-8081}:8080"
    restart: unless-stopped
