spring:
  datasource:
    url: jdbc:h2:mem:edulearn;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  cache:
    type: simple

app:
  jwt:
    secret: test-secret-key-must-have-at-least-32-bytes
    access-token-minutes: 30
    refresh-token-days: 14
    issuer: edulearn-test
  anthropic:
    enabled: false
    connect-timeout-ms: 1000
    read-timeout-ms: 2000
  chat:
    rate-limit:
      max-requests: 2
      window-seconds: 60
  email:
    enabled: false
  logging:
    execution:
      enabled: false
