spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: ${SPRING_APPLICATION_NAME:edulearn}
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:edulearn}?useSSL=${DB_USE_SSL:false}&requireSSL=${DB_REQUIRE_SSL:false}&allowPublicKeyRetrieval=${DB_ALLOW_PUBLIC_KEY_RETRIEVAL:true}&serverTimezone=${DB_TIMEZONE:UTC}&useUnicode=true&characterEncoding=utf8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: ${DB_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:30000}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME_MS:1800000}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    open-in-view: ${JPA_OPEN_IN_VIEW:false}
    properties:
      hibernate:
        format_sql: ${HIBERNATE_FORMAT_SQL:true}
  jackson:
    time-zone: ${JACKSON_TIME_ZONE:UTC}
  cache:
    type: ${CACHE_TYPE:redis}
    redis:
      time-to-live: ${REDIS_CACHE_TTL:5m}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: ${REDIS_TIMEOUT:2000ms}
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: ${MAIL_SMTP_AUTH:false}
      mail.smtp.starttls.enable: ${MAIL_SMTP_STARTTLS:false}

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:edulearn-super-secret-key-need-at-least-32-bytes-long}
    access-token-minutes: ${JWT_ACCESS_MINUTES:30}
    refresh-token-days: ${JWT_REFRESH_DAYS:14}
    issuer: ${JWT_ISSUER:edulearn}
  anthropic:
    enabled: ${ANTHROPIC_ENABLED:false}
    base-url: ${ANTHROPIC_BASE_URL:https://api.anthropic.com}
    api-key: ${ANTHROPIC_API_KEY:}
    model: ${ANTHROPIC_MODEL:claude-3-5-sonnet-latest}
    max-tokens: ${ANTHROPIC_MAX_TOKENS:512}
    version: ${ANTHROPIC_VERSION:2023-06-01}
    connect-timeout-ms: ${ANTHROPIC_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${ANTHROPIC_READ_TIMEOUT_MS:30000}
  chat:
    rate-limit:
      max-requests: ${CHAT_RATE_LIMIT_MAX_REQUESTS:20}
      window-seconds: ${CHAT_RATE_LIMIT_WINDOW_SECONDS:60}
  email:
    enabled: ${APP_EMAIL_ENABLED:false}
    from: ${APP_EMAIL_FROM:noreply@edulearn.com}
  logging:
    execution:
      enabled: ${EXECUTION_LOG_ENABLED:true}
      warn-threshold-ms: ${EXECUTION_LOG_WARN_THRESHOLD_MS:500}
